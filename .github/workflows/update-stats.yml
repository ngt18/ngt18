name: Atualizar estatísticas do perfil

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório do perfil
        uses: actions/checkout@v6

      - name: Gerar card de estatísticas
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dracula&hide_border=true&include_all_commits=true&count_private=true&locale=pt-br
          path: profile/stats.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Gerar card de linguagens
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=dracula&hide_border=true&langs_count=8&locale=pt-br
          path: profile/top-langs.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Salvar cards no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: atualizar estatísticas do perfil"
          git push
