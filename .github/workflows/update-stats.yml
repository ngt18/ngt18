name: Atualizar estatísticas do perfil

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório do perfil
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerar card de estatísticas
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: python .github/scripts/generate-stats.py

      - name: Gerar card de linguagens
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          EXTRA_LANGUAGE_REPOS: ${{ secrets.EXTRA_LANGUAGE_REPOS }}
        run: python .github/scripts/generate-top-langs.py

      - name: Salvar cards no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: atualizar estatísticas do perfil"
          git push
